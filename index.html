<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f4f6f4;color:#222}
#app{display:flex;flex-direction:column;height:100dvh}
#header{background:#1a1a2e;color:#fff;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px}
#header h1{font-size:14px;font-weight:700;white-space:nowrap}
.stats{display:flex;gap:8px;font-size:11px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:3px}
.stat-dot{width:7px;height:7px;border-radius:50%}
#gps-bar{background:#0f3460;color:#fff;padding:5px 12px;display:flex;align-items:center;gap:8px;font-size:12px;flex-shrink:0}
#gps-btn{padding:4px 12px;border-radius:12px;border:1px solid #7ab;background:transparent;color:#7cf;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
#gps-btn:hover{background:#1a4a6a}
#gps-status{font-size:11px;color:#adf;flex:1}
#filter-bar{background:#fff;border-bottom:1px solid #e0e0e0;padding:6px 10px;display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.fb{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid #ccc;background:#fff;cursor:pointer;color:#555;white-space:nowrap}
.fb.on{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
#map{flex:1;min-height:0;z-index:0}
#bottom{background:#fff;border-top:1px solid #e0e0e0;flex-shrink:0;max-height:42vh;overflow-y:auto}
#nearby-banner{display:none;background:#e8f5e9;border-bottom:1px solid #c8e6c9;padding:6px 12px;font-size:12px;color:#2e7d32}
.sc{display:flex;align-items:stretch;border-bottom:1px solid #f0f0f0}
.sc-bar{width:4px;flex-shrink:0}
.sc-inner{flex:1;padding:7px 10px;min-width:0}
.sc-top{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.sc-name{font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-area{font-size:10px;color:#999;flex-shrink:0}
.sc-tag{font-size:10px;padding:1px 5px;border-radius:8px;flex-shrink:0}
.sc-btns{display:flex;gap:4px}
.sb{flex:1;padding:5px 0;border-radius:6px;border:1px solid;font-size:11px;font-weight:600;cursor:pointer;background:#fff}
.sb-have{border-color:#1565C0;color:#1565C0}.sb-have:hover,.sb-have.active{background:#1565C0;color:#fff}
.sb-none{border-color:#E24B4A;color:#E24B4A}.sb-none:hover,.sb-none.active{background:#E24B4A;color:#fff}
.sb-unk{border-color:#aaa;color:#888}.sb-unk:hover,.sb-unk.active{background:#888;color:#fff}
.sb-map{padding:5px 8px;border-radius:6px;border:1px solid #4a90d9;background:#fff;color:#4a90d9;font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center}
.sb-map:hover{background:#4a90d9;color:#fff}
.sc-time{font-size:10px;color:#aaa;margin-top:2px}
.sc-dist{font-size:10px;color:#1565C0;margin-top:2px;font-weight:600}
#add-section{padding:10px 12px;border-top:2px solid #f0f0f0;background:#fafafa}
#add-section .atitle{font-size:11px;font-weight:700;color:#888;margin-bottom:6px}
#add-form{display:flex;gap:4px;flex-wrap:wrap}
#add-form input{flex:1;min-width:120px;font-size:12px;padding:6px 8px;border-radius:6px;border:1px solid #ccc}
#add-form select{font-size:11px;padding:6px 3px;border-radius:6px;border:1px solid #ccc;background:#fff}
#add-form button{padding:6px 12px;border-radius:6px;border:none;background:#1a1a2e;color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.pin-outer{display:flex;flex-direction:column;align-items:center}
.pin-circle{width:24px;height:24px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center}
.pin-tail{width:2px;height:5px;background:#666}
.pin-gps{width:14px;height:14px;border-radius:50%;background:#2196F3;border:2px solid #fff;box-shadow:0 0 0 4px rgba(33,150,243,.25)}
</style>
</head>
<body>
<div id="app">
<div id="header">
  <h1>🃏 トレカ在庫マップ 長野県</h1>
  <div class="stats">
    <div class="stat"><div class="stat-dot" style="background:#1565C0"></div><span id="cnt-h">0</span>あり</div>
    <div class="stat"><div class="stat-dot" style="background:#E24B4A"></div><span id="cnt-n">0</span>なし</div>
    <div class="stat"><div class="stat-dot" style="background:#aaa"></div><span id="cnt-u">0</span>未確認</div>
  </div>
</div>
<div id="gps-bar">
  <button id="gps-btn" onclick="getGPS()">📍 現在地を取得</button>
  <span id="gps-status"></span>
  <span id="sync-badge" style="font-size:11px;color:#adf;margin-left:4px"></span>
  <button onclick="gasLoad()" style="padding:4px 10px;border-radius:12px;border:1px solid #7ab;background:transparent;color:#7cf;font-size:11px;cursor:pointer;white-space:nowrap">🔄 更新</button>
  <button onclick="startMapAdd()" style="padding:4px 12px;border-radius:12px;border:1px solid #7cf;background:transparent;color:#7cf;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap">＋ 地図から追加</button>
</div>
<div id="filter-bar">
  <button class="fb on" onclick="setF('all')">すべて</button>
  <button class="fb" onclick="setF('seven')">セブン</button>
  <button class="fb" onclick="setF('lawson')">ローソン</button>
  <button class="fb" onclick="setF('famima')">ファミマ</button>
  <button class="fb" id="fb-nearby" style="display:none" onclick="setF('nearby')">📍 近く</button>
</div>
<div id="map"></div>
<div id="bottom">
  <div id="nearby-banner"></div>
  <div id="slist"></div>
  <div id="add-section">
    <div class="atitle">＋ 店舗を追加</div>
    <div id="add-form">
      <input id="nn" placeholder="店舗名">
      <select id="na">
        <option value="長野市">長野市</option><option value="須坂市">須坂市</option>
        <option value="中野市">中野市</option><option value="千曲市">千曲市</option>
        <option value="坂城町">坂城町</option><option value="上田市">上田市</option>
        <option value="松本市">松本市</option><option value="諏訪市">諏訪市</option>
        <option value="飯田市">飯田市</option><option value="佐久市">佐久市</option>
        <option value="その他">その他</option>
      </select>
      <select id="nt">
        <option value="seven">セブン</option><option value="lawson">ローソン</option>
        <option value="famima">ファミマ</option><option value="geo">GEO</option>
        <option value="bookoff">ブックオフ</option><option value="furuichi">ふるいち</option>
        <option value="aeon">イオン</option><option value="toy">おもちゃ屋</option>
        <option value="yamada">ヤマダ電機</option><option value="joshin">ジョーシン</option>
        <option value="heiando">平安堂</option>
        <option value="trecapit">トレカピット</option>
        <option value="other">その他</option>
    </div>
  </div>
</div>
</div>

const TC={seven:"#E24B4A",lawson:"#378ADD",famima:"#1D9E75",geo:"#7F77DD",bookoff:"#BA7517",furuichi:"#E0820A",aeon:"#D4537E",toy:"#0F6E56",yamada:"#FF0000",joshin:"#0066CC",heiando:"#8B4513",trecapit:"#9B59B6",other:"#888780"};
const TL={seven:"セブン",lawson:"ローソン",famima:"ファミマ",geo:"GEO",bookoff:"ブックオフ",furuichi:"ふるいち",aeon:"イオン",toy:"おもちゃ屋",yamada:"ヤマダ",joshin:"ジョーシン",heiando:"平安堂",trecapit:"トレカピット",other:"その他"};
const SC={have:"#1565C0",none:"#E24B4A",unknown:"#aaa"};
const SL={have:"✓ あり",none:"✗ なし",unknown:"未確認"};
const SI={seven:"7",lawson:"L",famima:"F",geo:"G",bookoff:"B",furuichi:"古",aeon:"A",toy:"T",yamada:"Y",joshin:"J",heiando:"平",trecapit:"P",other:"?"};

let stores=RAW.map(s=>({...s,status:"unknown",time:"",memo:"",timestamp:null,dist:null}));
let cf="all",map,leafletMarkers={},gpsMarker=null,userLat=null,userLng=null;

function initMap(){
  map=L.map('map').setView([36.45,138.20],12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',maxZoom:19
  }).addTo(map);
  stores.forEach(s=>addMarker(s));
}

function makeIcon(s){
  const sc=SC[s.status],tc=TC[s.type];
  const html=`<div class="pin-outer"><div class="pin-circle" style="background:${sc}"><span style="color:white;font-weight:900;font-size:9px">${SI[s.type]}</span></div><div class="pin-tail"></div></div>`;
  return L.divIcon({html,className:'',iconSize:[24,29],iconAnchor:[12,29],popupAnchor:[0,-30]});
}

function addMarker(s){
  if(leafletMarkers[s.id]) leafletMarkers[s.id].remove();
  const m=L.marker([s.lat,s.lng],{icon:makeIcon(s)}).addTo(map);
  m.bindPopup(`<b>${s.name}</b><br><small>${s.area}</small><br><span style="color:${SC[s.status]}">${SL[s.status]}</span>${s.time?'<br><small>'+s.time+'</small>':''}`);
  m.on('click',()=>scrollToStore(s.id));
  leafletMarkers[s.id]=m;
}

function refreshMarkers(){
  stores.forEach(s=>{
    const show=cf==="all"||s.type===cf||(cf==="nearby"&&s.dist!==null&&s.dist<3);
    if(show){
      if(leafletMarkers[s.id]){leafletMarkers[s.id].setIcon(makeIcon(s));if(!map.hasLayer(leafletMarkers[s.id]))leafletMarkers[s.id].addTo(map);}
      else addMarker(s);
    } else {
      if(leafletMarkers[s.id]&&map.hasLayer(leafletMarkers[s.id]))leafletMarkers[s.id].remove();
    }
  });
}

function scrollToStore(id){
  const el=document.getElementById('sc-'+id);
  if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
}

function getGPS(){
  const btn=document.getElementById('gps-btn');
  const status=document.getElementById('gps-status');
  btn.textContent='取得中...';
  status.textContent='位置情報を取得しています...';
  if(!navigator.geolocation){status.textContent='このブラウザはGPSに対応していません';btn.textContent='📍 現在地を取得';return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;userLng=pos.coords.longitude;
    if(gpsMarker)gpsMarker.remove();
    gpsMarker=L.marker([userLat,userLng],{icon:L.divIcon({html:'<div class="pin-gps"></div>',className:'',iconSize:[14,14],iconAnchor:[7,7]})}).bindPopup('現在地').addTo(map);
    map.setView([userLat,userLng],14);
    stores.forEach(s=>{s.dist=calcDist(userLat,userLng,s.lat,s.lng);});
    stores.sort((a,b)=>a.dist-b.dist);
    const nearest=stores.filter(s=>s.dist<3);
    status.textContent=`📍 取得済`;
    btn.textContent='📍 更新';
    // fb-nearbyは表示しない
    const banner=document.getElementById('nearby-banner');
    if(nearest.length>0){banner.style.display='block';banner.textContent=`📍 最寄り: ${nearest[0].name}（${nearest[0].dist.toFixed(1)}km）`;}
    renderList();
  },err=>{
    status.textContent='取得失敗: '+(err.code===1?'位置情報の許可が必要です':err.message);
    btn.textContent='📍 現在地を取得';
  },{enableHighAccuracy:true,timeout:10000});
}

function calcDist(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function checkExpiry(){
  const now=Date.now();
  let changed=false;
  stores.forEach(s=>{
    if(s.status!=="unknown"&&s.timestamp&&(now-s.timestamp)>24*60*60*1000){
      s.status="unknown";s.time="";s.memo="";s.timestamp=null;
      if(leafletMarkers[s.id])leafletMarkers[s.id].setIcon(makeIcon(s));
      changed=true;
    }
  });
  if(changed)renderList();
}

function applyRep(id,status,memo){
  const s=stores.find(x=>x.id===id);

  const now=new Date();
  s.time=`${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  if(leafletMarkers[id]){
    leafletMarkers[id].setIcon(makeIcon(s));
    leafletMarkers[id].setPopupContent(`<b>${s.name}</b><br><small>${s.area}</small><br><span style="color:${SC[s.status]}">${SL[s.status]}${s.memo?' : '+s.memo:''}</span><br><small>${s.time}</small>`);
  }
  gasPost({id:s.id,status:s.status,memo:s.memo,time:s.time,timestamp:s.timestamp});
  renderList();
}

function renderList(){
  checkExpiry();
  const list=document.getElementById('slist');list.innerHTML='';
  let vis=[...stores.filter(s=>{
    if(cf==="nearby")return s.dist!==null&&s.dist<3;
    return cf==="all"||s.type===cf;
  })];
  if(userLat!==null)vis.sort((a,b)=>(a.dist||999)-(b.dist||999));
  else vis.sort((a,b)=>({have:0,none:1,unknown:2}[a.status]-{have:0,none:1,unknown:2}[b.status]));
  vis.forEach(s=>{
    const sc=SC[s.status],tc=TC[s.type];
    const div=document.createElement('div');
    div.className='sc';div.id='sc-'+s.id;
    const distHtml=s.dist!==null?`<div class="sc-dist">📍 ${s.dist.toFixed(1)}km</div>`:'';
    // 残り時間表示
    let timeHtml='';
    if(s.time&&s.status!=="unknown"){
      let remainStr='';
      if(s.timestamp){
        const remain=Math.max(0,24*60*60*1000-(Date.now()-s.timestamp));
        const rh=Math.floor(remain/3600000);
        const rm=Math.floor((remain%3600000)/60000);
        remainStr=`（残 ${rh}h${rm}m）`;
      }
      const memoHtml=s.memo?`<span style="color:#1565C0;font-weight:600"> : ${s.memo}</span>`:'';
      timeHtml=`<div class="sc-time">報告: ${s.time}${memoHtml} <span style="color:#bbb">${remainStr}</span></div>`;
    }
    div.innerHTML=`
      <div class="sc-bar" style="background:${sc}"></div>
      <div class="sc-inner">
        <div class="sc-top">
          <div class="sc-name">${s.name}</div>
          <span class="sc-area">${s.area}</span>
          <span class="sc-tag" style="background:${tc}22;color:${tc}">${TL[s.type]}</span>
        </div>
        <div class="sc-btns">
          <button class="sb sb-have${s.status==='have'?' active':''}" onclick="rep(${s.id},'have')">✓ あり</button>
          <button class="sb sb-none${s.status==='none'?' active':''}" onclick="confirmRep(${s.id},'none','${s.name}')">✗ なし</button>
          <button class="sb sb-unk${s.status==='unknown'?' active':''}" onclick="confirmRep(${s.id},'unknown','${s.name}')">? 未確認</button>

          <button class="sb" style="border-color:#c0392b;color:#c0392b;max-width:32px" onclick="deleteStore(${s.id})" title="削除">🗑️</button>
        </div>
        ${distHtml}${timeHtml}
      </div>`;
    list.appendChild(div);
  });

  document.getElementById('cnt-n').textContent=stores.filter(s=>s.status==='none').length;
  document.getElementById('cnt-u').textContent=stores.filter(s=>s.status==='unknown').length;
}

  const dlg=document.createElement('div');
  dlg.id='del-dialog';
  dlg.style.cssText='position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #c0392b;padding:14px;z-index:9999;box-shadow:0 -4px 12px rgba(0,0,0,.15)';
  dlg.innerHTML=`
    <div style="font-size:13px;font-weight:700;color:#c0392b;margin-bottom:6px">🗑️ 店舗を削除しますか？</div>
    <div style="font-size:12px;color:#555;margin-bottom:12px">${s.name}（${s.area}）</div>
    <div style="display:flex;gap:8px">
      <button onclick="confirmDelete(${id})" style="flex:1;padding:9px 0;border-radius:6px;border:none;background:#c0392b;color:#fff;font-size:13px;font-weight:700;cursor:pointer">削除する</button>
      <button onclick="document.getElementById('del-dialog').remove()" style="flex:1;padding:9px 0;border-radius:6px;border:1px solid #ccc;background:#fff;font-size:13px;cursor:pointer">キャンセル</button>
    </div>`;
  document.body.appendChild(dlg);
}

function confirmDelete(id){
  // マーカー除去
  if(leafletMarkers[id]){
    leafletMarkers[id].remove();
    delete leafletMarkers[id];
  }
  // データから除去
  stores=stores.filter(x=>x.id!==id);
  // ダイアログ閉じる
  const d=document.getElementById('del-dialog');
  if(d)d.remove();
  renderList();
}

// ── Google Apps Script 連携 ──
const GAS_URL='https://script.google.com/macros/s/AKfycbzpJAZnZHgusDjJW_A3-TTess03A1Qmr2wAyyvMd6f-qzcO_74D20JByGA1t-nZuhgYmQ/exec';

function gasPost(data){
  fetch(GAS_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)
  }).catch(e=>console.warn('GAS POST error',e));
}

async function gasLoad(){
  const badge=document.getElementById('sync-badge');
  if(badge) badge.textContent='🔄 同期中...';
  try{
    const r=await fetch(GAS_URL+'?t='+Date.now(),{method:'GET',redirect:'follow'});
    const json=await r.json();
    if(!json.ok||!json.data) return;
    const now=Date.now();
    json.data.forEach(row=>{
      const s=stores.find(x=>String(x.id)===String(row.id));
      if(!s) return;
      const ts=Number(row.timestamp)||0;
      // 24時間以内 or timestampがない場合も反映
      if(!ts || (now-ts)<24*60*60*1000){
        if(row.status&&row.status!=='') s.status=row.status;
        s.memo=row.memo||'';
        s.time=row.time||'';
        s.timestamp=ts||now;
        if(leafletMarkers[s.id]) leafletMarkers[s.id].setIcon(makeIcon(s));
      }
    });
    renderList();
    const now2=new Date();
    const t=`${now2.getHours()}:${String(now2.getMinutes()).padStart(2,'0')}`;
    if(badge){ badge.textContent=`✅ ${t}同期済`; }
  }catch(e){
    console.warn('GAS load error',e);
    if(badge){ badge.textContent='⚠️ オフライン'; setTimeout(()=>{badge.textContent='';},3000); }
  }
}

window.addEventListener('load',()=>{
  initMap();
  renderList();
  gasLoad();
  setInterval(gasLoad,60000);
});
</script>
